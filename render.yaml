services:
  - type: web
    name: ocne
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: ENABLE_WS
        value: "false"
      - key: VITE_ENABLE_WS
        value: "false"
      - key: DATABASE_URL
        sync: false
